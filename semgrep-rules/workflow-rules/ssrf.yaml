rules:

  - id: ssrf-taint
    mode: taint
    languages: [php]
    severity: WARNING
    message: >
      SSRF vulnerability detected: user-controlled data ($SINK) reaches a network
      or file-fetching function without validation. An attacker can force the server
      to make requests to internal services or arbitrary external hosts.
    pattern-sources:
      - pattern: $_GET[...]
      - pattern: $_POST[...]
      - pattern: $_REQUEST[...]
      - pattern: $_COOKIE[...]


    pattern-sinks:
  
      - pattern: curl_init($SINK)
      - pattern: curl_setopt($CH, $OPT, $SINK)
        metavariable-regex:
          metavariable: $OPT
          regex: CURLOPT_(URL|PROXY)
    
      - pattern: curl_setopt_array($CH, [..., $KEY => $SINK, ...])
        metavariable-regex:
          metavariable: $KEY
          regex: CURLOPT_(URL|PROXY)

      - pattern: file_get_contents($SINK, ...)
      - pattern: fopen($SINK, ...)
      - pattern: file($SINK, ...)
      - pattern: readfile($SINK, ...)

      - pattern: fsockopen($SINK, ...)
      - pattern: pfsockopen($SINK, ...)
      - pattern: stream_socket_client($SINK, ...)

      - pattern: get_headers($SINK, ...)
      - pattern: getimagesize($SINK, ...)

