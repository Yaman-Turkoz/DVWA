name: Semgrep Security Scan
# pipeline testleri için branch ismi değiştirdim, düzeltmeyi unutma
on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  semgrep:
    name: Semgrep Scan
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write      
      pull-requests: write  

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

   
      - name: Run Semgrep
        run: |
          pip install semgrep
          semgrep scan . \
            --config=semgrep-rules/workflow-rules/ \
            --baseline-commit HEAD~1 \
            --json \
            --output=semgrep-report.json || true

     
      - name: Create GitHub Issues for findings
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: python3 scripts/create_issues.py

     
      - name: AI Analysis — comment on issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          REPO: ${{ github.repository }}
        run: python3 scripts/ai_analyze.py

     
      - name: AI Fix — open PRs for true positives
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          REPO: ${{ github.repository }}
        run: python3 scripts/ai_fix.py

      - name: Upload reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            semgrep-report.json
            created-issues.json
